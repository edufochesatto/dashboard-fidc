name: Dioptra FIDC Mensal

on:
  schedule:
    - cron: '0 8 20 * *'
  workflow_dispatch:

jobs:
  gerar-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: pip install -r requirements.txt
      - name: Executar dashboard
        run: python main.py
      - uses: actions/upload-artifact@v4
        with:
          name: Dioptra-FIDC-Dashboard
          path: output/Dioptra_FIDC_Julho2026.xlsx
          retention-days: 90

name: 📊 Atualizar Dashboard de Governança de FIDCs

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  atualizar:
    name: 🔄 Pipeline CVM → Google Sheets
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar pipeline
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python src/main.py

      - name: Registrar timestamp
        run: echo "Ultima atualizacao: $(date -u)" > ultima_execucao.txt

      - name: Salvar no repositório
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: Atualizacao automatica do dashboard
          file_pattern: ultima_execucao.txt
